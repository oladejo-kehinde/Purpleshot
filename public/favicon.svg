<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0a0a"/>
  
  <!-- Purple circle accent -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#a855f7" stroke-width="2"/>
  
  <!-- Camera aperture symbolism -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#f97316" stroke-width="1.5"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#f97316"/>
  
  <!-- Lens segments -->
  <path d="M 50 20 L 60 35 L 70 40" stroke="#a855f7" stroke-width="1.5" fill="none"/>
  <path d="M 50 20 L 40 35 L 30 40" stroke="#a855f7" stroke-width="1.5" fill="none"/>
  <path d="M 70 60 L 65 75 L 50 80" stroke="#a855f7" stroke-width="1.5" fill="none"/>
  <path d="M 30 60 L 35 75 L 50 80" stroke="#a855f7" stroke-width="1.5" fill="none"/>
</svg>